version: "3.9"

services:
  db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - supabase_db:/var/lib/postgresql/data

  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    restart: unless-stopped

    depends_on:
      - auth
      - rest
      - realtime
      - storage

    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml

    volumes:
      - ./kong.yml:/home/kong/kong.yml:ro

    labels:
      - traefik.enable=true

      # API DOMAIN
      - traefik.http.routers.supabase-api.rule=Host(`api.yourdomain.com`)
      - traefik.http.routers.supabase-api.entrypoints=websecure
      - traefik.http.routers.supabase-api.tls.certresolver=letsencrypt
      - traefik.http.services.supabase-api.loadbalancer.server.port=8000

  studio:
    image: supabase/studio:20250428-4e2e5d6
    container_name: supabase-studio
    restart: unless-stopped

    depends_on:
      - meta

    environment:
      STUDIO_PG_META_URL: http://meta:8080

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      DEFAULT_ORGANIZATION_NAME: Coolify
      DEFAULT_PROJECT_NAME: Supabase

      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}

      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

    labels:
      - traefik.enable=true

      # DASHBOARD DOMAIN
      - traefik.http.routers.supabase-studio.rule=Host(`supabase.yourdomain.com`)
      - traefik.http.routers.supabase-studio.entrypoints=websecure
      - traefik.http.routers.supabase-studio.tls.certresolver=letsencrypt
      - traefik.http.services.supabase-studio.loadbalancer.server.port=3000

  auth:
    image: supabase/gotrue:v2.158.1
    container_name: supabase-auth
    restart: unless-stopped

    depends_on:
      - db

    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999

      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres

      GOTRUE_SITE_URL: ${SUPABASE_PUBLIC_URL}

      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600

      GOTRUE_DISABLE_SIGNUP: false

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: supabase-rest
    restart: unless-stopped

    depends_on:
      - db

    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}

  realtime:
    image: supabase/realtime:v2.30.34
    container_name: supabase-realtime
    restart: unless-stopped

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres

      JWT_SECRET: ${JWT_SECRET}

      PORT: 4000

  storage:
    image: supabase/storage-api:v1.15.7
    container_name: supabase-storage
    restart: unless-stopped

    depends_on:
      - db
      - rest

    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}

      POSTGREST_URL: http://rest:3000

      PGRST_JWT_SECRET: ${JWT_SECRET}

      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres

      FILE_SIZE_LIMIT: 52428800

      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage

    volumes:
      - supabase_storage:/var/lib/storage

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: supabase-meta
    restart: unless-stopped

    depends_on:
      - db

    environment:
      PG_META_PORT: 8080

      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  supabase_db:
  supabase_storage:
